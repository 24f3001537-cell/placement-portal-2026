{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">

<div class="glass-card" style="width: 400px;">

<h3 class="text-center mb-3">Create Placement Drive</h3>

<form method="POST">

<input type="text" name="job_title" placeholder="Job Title" class="form-control mt-2" required>

<textarea name="description" placeholder="Description" class="form-control mt-2"></textarea>

<input type="text" name="eligibility" placeholder="Eligibility" class="form-control mt-2">

<input type="text" name="deadline" placeholder="Deadline" class="form-control mt-2">

<!-- optional -->
<!-- <input type="text" name="company_id" placeholder="Company ID" class="form-control mt-2"> -->

<button class="btn btn-custom w-100 mt-3">Create Drive</button>

</form>

</div>

</div>

{% endblock %}
