{% extends "base.html" %}

{% block content %}

<h2>My Applications</h2>

<table class="table table-bordered">
<a href="/drives" class="btn btn-primary">View Available Drives</a>
<tr>
<th>Drive ID</th>
<th>Status</th>
</tr>



{% for app in applications %}

<tr>
<td>{{app.drive_id}}</td>
<td>{{app.status}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
